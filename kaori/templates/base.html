<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="manifest" href="/static/manifest.json">
    <title>{% block title %}Kaori{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js" defer></script>
    <script src="/static/alpine.min.js" defer></script>
</head>
<body>
    <nav class="bottom-nav">
        <a href="/" class="nav-item {% if active_nav == 'dashboard' %}active{% endif %}">
            <span class="nav-icon">&#9633;</span>
            <span class="nav-label">Dashboard</span>
        </a>
        <a href="/meals" class="nav-item {% if active_nav == 'meals' %}active{% endif %}">
            <span class="nav-icon">&#9749;</span>
            <span class="nav-label">Meals</span>
        </a>
        <a href="/weight" class="nav-item {% if active_nav == 'weight' %}active{% endif %}">
            <span class="nav-icon">&#9878;</span>
            <span class="nav-label">Weight</span>
        </a>
        <a href="/workouts" class="nav-item {% if active_nav == 'workouts' %}active{% endif %}">
            <span class="nav-icon">&#9977;</span>
            <span class="nav-label">Gym</span>
        </a>
        <a href="/profile" class="nav-item {% if active_nav == 'profile' %}active{% endif %}">
            <span class="nav-icon">&#9881;</span>
            <span class="nav-label">Profile</span>
        </a>
    </nav>

    {% if test_mode %}
    <div class="test-mode-banner">TEST MODE</div>
    {% endif %}

    <main class="content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
